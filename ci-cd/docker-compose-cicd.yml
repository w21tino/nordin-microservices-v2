services:

  # ─── SonarQube ───────────────────────────────────────────────────────────────
  # Acceso: http://localhost:9000
  # Credenciales iniciales: admin / admin
  # Primera vez: te pedirá cambiar la contraseña
  sonarqube:
    image: sonarqube:10-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    depends_on:
      sonar-db:
        condition: service_healthy
    # SonarQube requiere vm.max_map_count >= 524288
    # Ejecutar en el host: sudo sysctl -w vm.max_map_count=524288

  sonar-db:
    image: postgres:16-alpine
    container_name: sonar-db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Jenkins ─────────────────────────────────────────────────────────────────
  # Acceso: http://localhost:8090
  # Password inicial: docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    ports:
      - "8090:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins-home:/var/jenkins_home
      # Acceso al Docker del host para poder hacer docker build
      - /var/run/docker.sock:/var/run/docker.sock
      # Maven cache para no descargar dependencias en cada build
      - maven-cache:/root/.m2
    user: root

volumes:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:
  sonar-db-data:
  jenkins-home:
  maven-cache:
