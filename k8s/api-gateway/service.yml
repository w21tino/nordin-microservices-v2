apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
  labels:
    app: api-gateway
spec:
  # NodePort — accesible desde fuera del cluster
  # En Kind: kubectl port-forward svc/api-gateway 8080:8080
  # En EKS: cambiar a LoadBalancer para obtener IP pública de AWS
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
