apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: default
  labels:
    app: auth-service
type: Opaque
# IMPORTANTE: JWT_SECRET debe tener mínimo 256 bits (32 caracteres)
# En producción: usar AWS Secrets Manager o Sealed Secrets
stringData:
  DB_USER: "auth_user"
  DB_PASS: "auth_pass"
  REDIS_PASS: ""
  JWT_SECRET: "nordin-secret-key-para-desarrollo-minimo-256-bits"
