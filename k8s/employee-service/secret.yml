apiVersion: v1
kind: Secret
metadata:
  name: employee-service-secret
  namespace: default
  labels:
    app: employee-service
type: Opaque
# IMPORTANTE: En producción usar Sealed Secrets o AWS Secrets Manager
# Valores en base64: echo -n "valor" | base64
# emp_user → ZW1wX3VzZXI=
# emp_pass → ZW1wX3Bhc3M=
stringData:
  DB_USER: "emp_user"
  DB_PASS: "emp_pass"
