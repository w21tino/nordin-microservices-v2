apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: org-db-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: org-db
  namespace: default
  labels:
    app: org-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: org-db
  template:
    metadata:
      labels:
        app: org-db
    spec:
      containers:
        - name: org-db
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "org_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: organization-service-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: organization-service-secret
                  key: DB_PASS
          volumeMounts:
            - name: org-db-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "org_user", "-d", "org_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: org-db-storage
          persistentVolumeClaim:
            claimName: org-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: org-db
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: org-db
  ports:
    - port: 5432
      targetPort: 5432
---
