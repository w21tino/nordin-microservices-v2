server:
  port: 8084

spring:
  application:
    name: auth-service

  # ─── PostgreSQL — almacena usuarios ──────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:auth_db}
    username: ${DB_USER:auth_user}
    password: ${DB_PASS:auth_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ─── Redis — almacena refresh tokens con TTL ─────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 2000ms

# ─── JWT ─────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:nordin-secret-key-para-desarrollo-minimo-256-bits}
  access-token-expiration: 900000      # 15 minutos en ms
  refresh-token-expiration: 604800000  # 7 días en ms

# ─── Actuator ────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# ─── SpringDoc ───────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  pattern:
    level: "%d{HH:mm:ss.SSS} %-5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

info:
  app:
    name: Auth Service
    version: 2.0.0
