server:
  port: 8083

spring:
  application:
    name: employee-service

  # ─── Base de datos ───────────────────────────────────
  # En K8s: sobreescrito por ConfigMap + Secret
  # En local: valores por defecto de variables de entorno
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:emp_db}
    username: ${DB_USER:emp_user}
    password: ${DB_PASS:emp_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# ─── Actuator ────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# ─── SpringDoc ───────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ─── Logging ─────────────────────────────────────────
logging:
  pattern:
    level: "%d{HH:mm:ss.SSS} %-5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

info:
  app:
    name: Employee Service
    version: 2.0.0
