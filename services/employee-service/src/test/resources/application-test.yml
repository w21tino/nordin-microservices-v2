spring:
  datasource:
    url: jdbc:h2:mem:emp_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  config:
    import: "optional:configserver:"

  cloud:
    config:
      enabled: false
