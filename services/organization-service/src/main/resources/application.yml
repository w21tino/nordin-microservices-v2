server:
  port: 8081

spring:
  application:
    name: organization-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:org_db}
    username: ${DB_USER:org_user}
    password: ${DB_PASS:org_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cloud:
    openfeign:
      client:
        config:
          department-service:
            url: ${DEPARTMENT_SERVICE_URL:}
            connect-timeout: 3000
            read-timeout: 5000
      circuitbreaker:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      department-service:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        record-exceptions:
          - java.io.IOException
          - java.net.ConnectException
          - feign.FeignException
  retry:
    instances:
      department-service:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - java.net.ConnectException
          - feign.FeignException

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  pattern:
    level: "%d{HH:mm:ss.SSS} %-5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

info:
  app:
    name: Organization Service
    version: 2.0.0
