# ─────────────────────────────────────────────────────────────────────────────
# sonar-project.properties
# Configuración de SonarQube para nordin-microservices-v2
#
# USO LOCAL:
#   mvn sonar:sonar \
#     -Dsonar.host.url=http://localhost:9000 \
#     -Dsonar.token=<TOKEN_GENERADO_EN_SONARQUBE>
#
# En Jenkins: el token se lee de las credenciales configuradas
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=nordin-microservices-v2
sonar.projectName=nordin-microservices-v2
sonar.projectVersion=2.0.0
sonar.host.url=http://localhost:9000

# ─── Módulos del proyecto multi-módulo ───────────────────────────────────────
sonar.modules=auth-service,employee-service,department-service,organization-service,api-gateway

auth-service.sonar.projectName=auth-service
auth-service.sonar.projectBaseDir=services/auth-service

employee-service.sonar.projectName=employee-service
employee-service.sonar.projectBaseDir=services/employee-service

department-service.sonar.projectName=department-service
department-service.sonar.projectBaseDir=services/department-service

organization-service.sonar.projectName=organization-service
organization-service.sonar.projectBaseDir=services/organization-service

api-gateway.sonar.projectName=api-gateway
api-gateway.sonar.projectBaseDir=infrastructure/api-gateway

# ─── Fuentes y tests ─────────────────────────────────────────────────────────
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# ─── Cobertura de tests (JaCoCo) ─────────────────────────────────────────────
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ─── Exclusiones ─────────────────────────────────────────────────────────────
# No analizar DTOs, entidades ni clases generadas por MapStruct
sonar.exclusions=\
  **/dto/**,\
  **/model/**,\
  **/*Application.java,\
  **/exception/*NotFoundException.java,\
  **/mapper/**

# ─── Quality Gate — umbrales mínimos ─────────────────────────────────────────
# El pipeline falla si no se cumplen estos umbrales
# Configurar en SonarQube UI: Quality Gates → nordin-v2
# - Coverage >= 70%
# - Duplicated Lines < 3%
# - Maintainability Rating >= A
# - Reliability Rating >= A
# - Security Rating >= A
